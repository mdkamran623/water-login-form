<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Animated & Transparent Login Form with Water Effect</title>
    
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css" />
    <link href="https://fonts.googleapis.com/css?family=Nunito&display=swap" rel="stylesheet" />
    
    <style>
        /* ===== MAIN STYLES ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            width: 100%;
            scroll-behavior: smooth;
        }

        .noselect {
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: -moz-none;
        }

        .water {
            font-family: "Segoe UI", Tahoma, Verdana, sans-serif;
            min-height: 100vh;
            width: 100%;
            background-image: url("https://images.unsplash.com/photo-1555412654-72a95a495858?ixlib=rb-1.2.1&ixid=eyJhcHBfaWQiOjEyMDd9&auto=format&fit=crop&w=634&q=80");
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .main {
            width: 100%;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .cent {
            display: flex;
            justify-content: center;
            text-align: center;
            vertical-align: middle;
        }

        /* ===== USER ICON ===== */
        .user_div {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 10;
        }

        #user {
            width: 220px;
            height: 220px;
            clip-path: circle(46% at 50% 50%);
            box-shadow: inset -3px -3px 114px 23px #050b11a8, 0 0 50px rgba(108, 192, 229, 0.3);
            object-fit: cover;
            transition: all 0.3s ease;
            cursor: pointer;
            border: 3px solid rgba(108, 192, 229, 0.3);
        }

        #user:hover {
            box-shadow: inset -3px -3px 100px 1px #ffffff, 0 0 60px rgba(108, 192, 229, 0.6);
            transform: scale(1.08);
            border-color: rgba(108, 192, 229, 0.8);
        }

        /* ===== SCALE ANIMATIONS ===== */
        .scale-out-center {
            -webkit-animation: scale-out-center 0.5s cubic-bezier(0.55, 0.085, 0.68, 0.53) both;
            animation: scale-out-center 0.5s cubic-bezier(0.55, 0.085, 0.68, 0.53) both;
        }

        @-webkit-keyframes scale-out-center {
            0% {
                -webkit-transform: scale(1);
                transform: scale(1);
                opacity: 1;
            }
            100% {
                -webkit-transform: scale(0);
                transform: scale(0);
                opacity: 1;
            }
        }

        @keyframes scale-out-center {
            0% {
                -webkit-transform: scale(1);
                transform: scale(1);
                opacity: 1;
            }
            100% {
                -webkit-transform: scale(0);
                transform: scale(0);
                opacity: 1;
            }
        }

        .scale-in-center {
            -webkit-animation: scale-in-center 2.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
            animation: scale-in-center 2.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }

        @-webkit-keyframes scale-in-center {
            0% {
                -webkit-transform: scale(0);
                transform: scale(0);
                opacity: 1;
            }
            100% {
                -webkit-transform: scale(1);
                transform: scale(1);
                opacity: 1;
            }
        }

        @keyframes scale-in-center {
            0% {
                -webkit-transform: scale(0);
                transform: scale(0);
                opacity: 1;
            }
            100% {
                -webkit-transform: scale(1);
                transform: scale(1);
                opacity: 1;
            }
        }

        /* ===== FORM - BIGGER CONTAINER ===== */
        #form {
            display: none;
            width: 100%;
            padding: 0 20px;
            z-index: 20;
            position: relative;
        }

        .container_form {
            width: 100%;
            max-width: 550px;
            margin: 0 auto;
            padding: 30px 0;
        }

        h1 {
            color: #6cc0e5;
            font-size: 2.8rem;
            text-shadow: 0 0 30px rgba(108, 192, 229, 0.4);
            letter-spacing: 2px;
            font-weight: 700;
        }

        .tracking-in-expand-fwd {
            -webkit-animation: tracking-in-expand-fwd 3s cubic-bezier(0.215, 0.61, 0.355, 1) both;
            animation: tracking-in-expand-fwd 3s cubic-bezier(0.215, 0.61, 0.355, 1) both;
        }

        @-webkit-keyframes tracking-in-expand-fwd {
            0% {
                letter-spacing: -0.5em;
                -webkit-transform: translateZ(-700px);
                transform: translateZ(-700px);
                opacity: 0;
            }
            40% {
                opacity: 0.6;
            }
            100% {
                -webkit-transform: translateZ(0);
                transform: translateZ(0);
                opacity: 1;
            }
        }

        @keyframes tracking-in-expand-fwd {
            0% {
                letter-spacing: -0.5em;
                -webkit-transform: translateZ(-700px);
                transform: translateZ(-700px);
                opacity: 0;
            }
            40% {
                opacity: 0.6;
            }
            100% {
                -webkit-transform: translateZ(0);
                transform: translateZ(0);
                opacity: 1;
            }
        }

        label {
            color: rgb(240, 236, 236);
            font-weight: 600;
            font-size: 1.1rem;
            letter-spacing: 0.5px;
        }

        form {
            padding: 30px 40px;
        }

        .general_container {
            width: 100%;
            margin: 0 auto;
            background-color: rgba(3, 10, 22, 0.75);
            border-radius: 20px;
            padding: 20px 0 30px 0;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(108, 192, 229, 0.25);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .email_div label,
        .psw_div label {
            display: flex;
            align-self: flex-start;
            padding-left: 14%;
            margin-bottom: 8px;
        }

        .check_div {
            padding: 20px 0px 30px 0px;
        }

        .title_div {
            padding-top: 2rem;
            padding-bottom: 0.5rem;
        }

        .btn_div {
            padding-bottom: 1rem;
        }

        .btn_signIn {
            background: linear-gradient(135deg, rgba(40, 55, 83, 0.8), rgba(108, 192, 229, 0.3));
            border: 2px solid #6cc0e5;
            padding: 12px 50px;
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            border-radius: 50px;
            color: white;
        }

        .btn_signIn:hover {
            background: linear-gradient(135deg, rgba(108, 192, 229, 0.5), rgba(40, 55, 83, 0.8));
            border-color: white;
            box-shadow: 0 0 40px rgba(108, 192, 229, 0.4);
            transform: translateY(-3px) scale(1.02);
        }

        .btn_signIn:focus {
            background-color: rgba(116, 146, 207, 0.5) !important;
            border-color: white !important;
            box-shadow: 0 0 0px !important;
            outline: 0 none;
        }

        /* ===== INPUT FIELDS - BIGGER ===== */
        .general_container input[type="email"],
        .general_container input[type="password"] {
            width: 75%;
            border: 0;
            background: rgba(255, 255, 255, 0.05);
            display: block;
            border: 2px solid #6fb8dd;
            outline: none;
            color: rgb(215, 225, 228);
            border-radius: 50px;
            transition: 0.3s ease;
            margin-left: auto;
            margin-right: auto;
            padding: 12px 30px;
            font-size: 1rem;
        }

        .general_container input[type="email"]:focus,
        .general_container input[type="password"]:focus {
            width: 90%;
            padding: 12px 25px;
            border-color: #ffffff;
            box-shadow: 0 0 30px rgba(108, 192, 229, 0.2);
            outline: 0 none;
            background-color: rgba(255, 255, 255, 0.1);
        }

        input[type="email"]::placeholder,
        input[type="password"]::placeholder {
            color: #6cc0e5;
            opacity: 0.7;
            font-size: 0.95rem;
        }

        /* ===== CHECKBOX STYLES ===== */
        .chickyboxes input[type="checkbox"] {
            display: none;
        }

        .chickyboxes input[type="checkbox"] + label {
            display: block;
            position: relative;
            padding-left: 40px;
            margin-bottom: 0;
            font: 16px/24px "Segoe UI", Tahoma, Verdana, sans-serif;
            color: #ddd;
            cursor: pointer;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }

        .chickyboxes input[type="checkbox"] + label:before {
            content: "";
            display: block;
            width: 24px;
            height: 24px;
            border: 2px solid #6cc0e5;
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0.6;
            -webkit-transition: all 0.12s, border-color 0.08s;
            transition: all 0.12s, border-color 0.08s;
            background: transparent;
            border-radius: 6px;
        }

        .chickyboxes input[type="checkbox"]:checked + label:before {
            width: 12px;
            top: -5px;
            left: 6px;
            opacity: 1;
            border-top-color: transparent;
            border-left-color: transparent;
            -webkit-transform: rotate(45deg);
            transform: rotate(45deg);
            border-radius: 0;
        }

        /* ===== THANK YOU MESSAGE ===== */
        .thank-you-message {
            display: none;
            text-align: center;
            padding: 40px 20px;
            color: white;
            animation: fadeInUp 0.8s ease forwards;
        }

        .thank-you-message h2 {
            color: #6cc0e5;
            font-size: 3rem;
            margin-bottom: 15px;
            text-shadow: 0 0 30px rgba(108, 192, 229, 0.3);
        }

        .thank-you-message p {
            font-size: 1.3rem;
            opacity: 0.9;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ===== RESPONSIVE ===== */
        @media screen and (max-width: 1200px) {
            .general_container {
                margin-top: 5%;
            }
            #user {
                width: 200px;
                height: 200px;
            }
        }

        @media screen and (max-width: 992px) {
            .container_form {
                max-width: 500px;
            }
            #user {
                width: 180px;
                height: 180px;
            }
            h1 {
                font-size: 2.5rem;
            }
        }

        @media screen and (max-width: 768px) {
            .container_form {
                max-width: 100%;
                padding: 15px 0;
            }
            .general_container {
                margin-top: 2%;
                padding: 15px 0 20px 0;
                border-radius: 16px;
            }
            h1 {
                font-size: 2.2rem;
            }
            form {
                padding: 20px 20px;
            }
            .general_container input[type="email"],
            .general_container input[type="password"] {
                width: 85%;
                padding: 10px 25px;
            }
            .email_div label,
            .psw_div label {
                padding-left: 8%;
                font-size: 1rem;
            }
            #user {
                width: 160px;
                height: 160px;
            }
            .btn_signIn {
                padding: 10px 35px;
                font-size: 1.1rem;
            }
        }

        @media screen and (max-width: 576px) {
            .container_form {
                padding: 10px 0;
            }
            .general_container {
                border-radius: 14px;
                padding: 10px 0 15px 0;
            }
            h1 {
                font-size: 1.8rem;
            }
            form {
                padding: 15px 15px;
            }
            .general_container input[type="email"],
            .general_container input[type="password"] {
                width: 92%;
                padding: 8px 20px;
                font-size: 0.9rem;
            }
            .email_div label,
            .psw_div label {
                padding-left: 4%;
                font-size: 0.9rem;
            }
            .check_div {
                padding: 15px 0px 20px 0px;
            }
            .btn_div {
                padding-bottom: 0.5rem;
            }
            .btn_signIn {
                padding: 8px 25px;
                font-size: 1rem;
                width: 65%;
            }
            .chickyboxes input[type="checkbox"] + label {
                font-size: 14px;
                padding-left: 35px;
            }
            .chickyboxes input[type="checkbox"] + label:before {
                width: 20px;
                height: 20px;
            }
            .chickyboxes input[type="checkbox"]:checked + label:before {
                width: 10px;
                top: -4px;
                left: 5px;
            }
            #user {
                width: 130px;
                height: 130px;
            }
            .title_div {
                padding-top: 1.2rem;
            }
            .thank-you-message h2 {
                font-size: 2rem;
            }
            .thank-you-message p {
                font-size: 1rem;
            }
        }

        @media screen and (max-width: 400px) {
            .general_container {
                border-radius: 12px;
            }
            h1 {
                font-size: 1.5rem;
            }
            form {
                padding: 10px 10px;
            }
            .general_container input[type="email"],
            .general_container input[type="password"] {
                width: 95%;
                padding: 6px 15px;
                font-size: 0.8rem;
            }
            .email_div label,
            .psw_div label {
                font-size: 0.8rem;
            }
            .btn_signIn {
                padding: 6px 18px;
                font-size: 0.85rem;
                width: 75%;
            }
            #user {
                width: 100px;
                height: 100px;
            }
            .thank-you-message h2 {
                font-size: 1.6rem;
            }
            .thank-you-message p {
                font-size: 0.9rem;
            }
        }

        @media screen and (min-width: 769px) and (max-width: 1200px) {
            #user {
                width: 190px;
                height: 190px;
            }
        }
    </style>
</head>

<body>
    <div class="water" id="waterBg">
        <div class="main">
            <!-- Login Form -->
            <div class="container-fluid container_form scale-in-center" id="form">
                <div class="row">
                    <div class="col-lg-12">
                        <div class="general_container">
                            <div class="row cent title_div">
                                <div class="col-md-12 tracking-in-expand-fwd">
                                    <h1>🌊 Inside Water</h1>
                                </div>
                            </div>

                            <form id="loginForm" action="#" method="post">
                                <div class="form-group email_div">
                                    <label for="exampleInputEmail1">📧 Email address</label>
                                    <input
                                        type="email"
                                        class="form-control"
                                        id="exampleInputEmail1"
                                        placeholder="Enter your email"
                                        autocomplete="off"
                                        required
                                    />
                                </div>

                                <div class="form-group psw_div">
                                    <label for="exampleInputPassword1">🔒 Password</label>
                                    <input
                                        type="password"
                                        class="form-control"
                                        id="exampleInputPassword1"
                                        placeholder="Enter your password"
                                        autocomplete="off"
                                        required
                                    />
                                </div>

                                <div class="col-md-12 check_div cent">
                                    <div class="form-check chickyboxes">
                                        <input type="checkbox" id="box-1" />
                                        <label for="box-1">Remember Me</label>
                                    </div>
                                </div>

                                <div class="col-md-12 btn_div cent">
                                    <button type="submit" class="btn btn-primary btn_signIn">
                                        🚀 Sign In
                                    </button>
                                </div>
                            </form>

                            <!-- Thank You Message -->
                            <div id="thankYouMessage" class="thank-you-message">
                                <h2>🎉 Thank You!</h2>
                                <p>You have successfully logged in. Welcome back! 👋</p>
                                <button onclick="resetForm()" class="btn btn_signIn" style="margin-top:20px;">
                                    🔄 Back to Login
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- User Icon -->
            <div class="user_div noselect" id="user_div">
                <img
                    src="4.png"
                    alt="user icon"
                    id="user"
                    class="noselect"
                    onclick="Login(); scale_out();"
                />
            </div>
        </div>
    </div>

    <!-- ===== SCRIPTS ===== -->
    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.ripples/0.5.3/jquery.ripples.min.js"></script>

    <script>
        // ===== WATER EFFECT =====
        $(document).ready(function() {
            $(".water").ripples({
                resolution: 256,
                perturbance: 0.01,
            });

            // Show user icon with animation
            scale_in();

            // Form submission handler
            $("#loginForm").on("submit", function(e) {
                e.preventDefault();

                var email = $("#exampleInputEmail1").val().trim();
                var password = $("#exampleInputPassword1").val().trim();

                if (email === "" || password === "") {
                    alert("⚠️ Please fill in both fields.");
                    return;
                }

                if (!email.includes("@") || !email.includes(".")) {
                    alert("⚠️ Please enter a valid email address.");
                    return;
                }

                if (password.length < 6) {
                    alert("⚠️ Password must be at least 6 characters long.");
                    return;
                }

                // Hide form and show thank you message
                $("#loginForm").fadeOut(400, function() {
                    $("#thankYouMessage").fadeIn(500);
                });

                console.log("✅ Logged in with:", email);
            });
        });

        // ===== FUNCTIONS =====
        function Login() {
            setTimeout(function() {
                document.getElementById("form").style.display = "block";
            }, 600);
            setTimeout(function() {
                document.getElementById("user_div").style.display = "none";
            }, 500);
        }

        function scale_out() {
            var element = document.getElementById("user_div");
            element.classList.remove("scale-in-center");
            element.classList.add("scale-out-center");
        }

        function scale_in() {
            var element = document.getElementById("user_div");
            element.classList.add("scale-in-center");
        }

        function resetForm() {
            $("#thankYouMessage").fadeOut(400, function() {
                $("#loginForm").fadeIn(400);
                $("#exampleInputEmail1").val("");
                $("#exampleInputPassword1").val("");
                $("#box-1").prop("checked", false);
            });
        }

        // Input placeholder effects
        $("input").focus(function() {
            $(this).data("placeholder", $(this).attr("placeholder")).attr("placeholder", "");
        }).blur(function() {
            $(this).attr("placeholder", $(this).data("placeholder"));
        });
    </script>
</body>
</html>
